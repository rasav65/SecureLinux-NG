# SecureLinux-NG example config: strict
PROFILE=strict
STATE_DIR=/var/log/securelinux-ng
# REPORT_FILE=/var/log/securelinux-ng/report.json
# MANIFEST_FILE=/var/log/securelinux-ng/manifest.json

# user.max_user_namespaces limit (FSTEC 2.5.5)
# Оставьте пустым для автоопределения (0 если нет Docker/Podman/K8s)
# Установите 10000 если планируется использование Docker/Podman/K8s
# USER_NAMESPACES_LIMIT=10000

# Дополнительные разрешения UFW (раскомментируйте нужные):
# UFW_ALLOW_FROM_1="from 10.128.24.0/29 to any comment nb"
# UFW_ALLOW_FROM_2="from 10.0.12.0/29 to any comment cl"
